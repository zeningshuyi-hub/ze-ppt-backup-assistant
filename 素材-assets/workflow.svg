<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="250" viewBox="0 0 1120 250" role="img" aria-label="泽PPT备份助手工作流程">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1120" height="250" rx="22" fill="#f8fafc"/>
  <rect x="58" y="118" width="1004" height="8" rx="4" fill="url(#line)" opacity="0.28"/>

  <g transform="translate(58 46)">
    <rect width="210" height="150" rx="18" fill="#ffffff" stroke="#dbeafe"/>
    <circle cx="105" cy="42" r="24" fill="#dbeafe"/>
    <text x="105" y="51" text-anchor="middle" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">1</text>
    <text x="105" y="92" text-anchor="middle" fill="#0f172a" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">打开文件</text>
    <text x="105" y="124" text-anchor="middle" fill="#64748b" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="16">PPT / Word / PDF</text>
  </g>

  <g transform="translate(322 46)">
    <rect width="210" height="150" rx="18" fill="#ffffff" stroke="#dbeafe"/>
    <circle cx="105" cy="42" r="24" fill="#dcfce7"/>
    <text x="105" y="51" text-anchor="middle" fill="#15803d" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">2</text>
    <text x="105" y="92" text-anchor="middle" fill="#0f172a" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">后台检测</text>
    <text x="105" y="124" text-anchor="middle" fill="#64748b" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="16">不打扰授课演示</text>
  </g>

  <g transform="translate(586 46)">
    <rect width="210" height="150" rx="18" fill="#ffffff" stroke="#dbeafe"/>
    <circle cx="105" cy="42" r="24" fill="#ffedd5"/>
    <text x="105" y="51" text-anchor="middle" fill="#c2410c" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">3</text>
    <text x="105" y="92" text-anchor="middle" fill="#0f172a" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">自动备份</text>
    <text x="105" y="124" text-anchor="middle" fill="#64748b" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="16">按日期分类保存</text>
  </g>

  <g transform="translate(850 46)">
    <rect width="210" height="150" rx="18" fill="#ffffff" stroke="#dbeafe"/>
    <circle cx="105" cy="42" r="24" fill="#f3e8ff"/>
    <text x="105" y="51" text-anchor="middle" fill="#7e22ce" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">4</text>
    <text x="105" y="92" text-anchor="middle" fill="#0f172a" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">查看记录</text>
    <text x="105" y="124" text-anchor="middle" fill="#64748b" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="16">主界面和日志</text>
  </g>
